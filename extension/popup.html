<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault Watch Together</title>
    <style>
        :root {
            --primary: #DC2626;
            --primary-hover: #b91c1c;
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-muted: #a3a3a3;
            --border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: var(--text);
            font-size: 14px;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .container {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #000000;
            min-height: 100vh;
            /* Ensure it fills height */
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #ef4444);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .logo svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .status-indicator {
            position: relative;
            width: 12px;
            height: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            /* Default disconnected */
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .status-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .status-text {
            font-weight: 500;
            color: var(--text);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(220, 38, 38, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #2a2a2a;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding-top: 10px;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--primary);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </div>
            <span class="title">StreamVault</span>
        </div>

        <div class="status-card">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
            </div>
            <div class="status-info">
                <span class="status-label">Status</span>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </div>

        <div id="connectForm" class="input-group">
            <div class="input-group">
                <label for="roomCode">Room Code</label>
                <input type="text" id="roomCode" placeholder="Enter 6-digit code" maxlength="6"
                    style="text-transform: uppercase;">
            </div>

            <div class="toggle-row" id="hostToggleRow">
                <span class="status-text" style="font-size: 14px;">I am the Host</span>
                <label class="switch">
                    <input type="checkbox" id="isHost">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn btn-primary" id="joinBtn">
                <span>Join Room</span>
            </button>
        </div>

        <div id="connectedView" class="hidden input-group">
            <div class="input-group">
                <label>Active Room</label>
                <input type="text" id="currentRoom" readonly>
            </div>
            <button class="btn btn-secondary" id="leaveBtn">Leave Room</button>
        </div>

        <div class="footer">
            <a href="https://streamvault.live" target="_blank">streamvault.live</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
