<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault Watch Together</title>
    <style>
        :root {
            --primary: #DC2626;
            --primary-hover: #b91c1c;
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-muted: #a3a3a3;
            --border: #333333;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: #0a0a0a;
        }

        body {
            width: 370px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            font-size: 14px;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .container {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #000000;
            min-height: calc(100vh - 20px);
            border-radius: 16px;
            box-shadow:
                0 0 15px rgba(220, 38, 38, 0.6),
                0 0 30px rgba(220, 38, 38, 0.4),
                0 0 45px rgba(220, 38, 38, 0.2);
            border: 2px solid rgba(220, 38, 38, 0.6);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #ef4444);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .logo svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .status-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .status-indicator {
            position: relative;
            width: 12px;
            height: 12px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.4);
        }

        .status-dot.detecting {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .status-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .status-text {
            font-weight: 500;
            color: var(--text);
        }

        .info-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .info-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .info-card p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .room-code {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--primary);
            margin: 12px 0;
            font-family: monospace;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #2a2a2a;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            margin-bottom: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding-top: 10px;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--primary);
        }

        .hidden {
            display: none !important;
        }

        .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon.warning {
            background: rgba(245, 158, 11, 0.2);
        }

        .icon.success {
            background: rgba(34, 197, 94, 0.2);
        }

        .icon svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </div>
            <span class="title">StreamVault</span>
        </div>

        <div class="status-card">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
            </div>
            <div class="status-info">
                <span class="status-label">Status</span>
                <span class="status-text" id="statusText">Checking...</span>
            </div>
        </div>

        <!-- Not in a room view -->
        <div id="notInRoomView" class="info-card hidden">
            <div class="icon warning">
                <svg fill="#f59e0b" viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                </svg>
            </div>
            <h3>No Active Room</h3>
            <p>Go to StreamVault and join or create a Watch Together room to sync videos.</p>
            <a href="https://streamvault.live" target="_blank" class="btn btn-primary" style="margin-top: 16px;">
                Open StreamVault
            </a>
        </div>

        <!-- Room detected view -->
        <div id="roomDetectedView" class="info-card hidden">
            <div class="icon success">
                <svg fill="#22c55e" viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                </svg>
            </div>
            <h3>Room Detected</h3>
            <div class="room-code" id="detectedRoomCode">------</div>

            <div class="toggle-row" id="hostToggleRow">
                <span class="status-text" style="font-size: 14px;">I am the Host</span>
                <label class="switch">
                    <input type="checkbox" id="isHost">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn btn-primary" id="joinBtn">
                <span>Connect Extension</span>
            </button>
        </div>

        <!-- Connected view -->
        <div id="connectedView" class="info-card hidden">
            <div class="icon success">
                <svg fill="#22c55e" viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                </svg>
            </div>
            <h3>Connected!</h3>
            <div class="room-code" id="currentRoom">------</div>
            <p id="hostStatus">Syncing as Viewer</p>
            <button class="btn btn-secondary" id="leaveBtn" style="margin-top: 16px;">Disconnect</button>
        </div>

        <div class="footer">
            <a href="https://streamvault.live" target="_blank">streamvault.live</a>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
