# HTTP -> HTTPS Redirection for both domains
server {
    listen 80;
    server_name streamvault.in www.streamvault.in streamvault.live www.streamvault.live;

    location / {
        return 301 https://$host$request_uri;
    }
}

# StreamVault.in (Ad-Supported)
server {
    listen 443 ssl;
    server_name streamvault.in www.streamvault.in;

    ssl_certificate /etc/letsencrypt/live/streamvault.live/fullchain.pem; # Certbot uses the first domain by default
    ssl_certificate_key /etc/letsencrypt/live/streamvault.live/privkey.pem;

    # Custom error page when upstream is down
    error_page 502 503 504 =503 /maintenance.html;
    location = /maintenance.html {
        root /var/www/html;
        internal;
    }

    # Long timeout for admin endpoints (health checks, etc.)
    location /api/admin/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_intercept_errors on;
    }

    # Streaming download proxy — large files, disable buffering so bytes
    # flow straight from Node -> client without nginx holding them in
    # /var/cache/nginx/proxy_temp. Extended timeouts for multi-GB downloads.
    location /api/dl {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # CRITICAL: stream bytes chunk-by-chunk (don't buffer the whole file)
        proxy_buffering off;
        proxy_request_buffering off;

        # Long timeouts for slow / huge downloads (1 hour)
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # Pass upstream errors through; don't hijack with maintenance page
        proxy_intercept_errors off;

        # Preserve upstream headers including Accept-Ranges, Content-Range
        proxy_pass_request_headers on;
    }

    # Video streaming proxy. Same config as /api/dl but for inline playback.
    # Cloudflare in front of this origin will cache responses (see Page Rule
    # instructions in README/docs); subsequent viewers served from CF edge.
    location /api/stream {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_intercept_errors off;
        proxy_pass_request_headers on;
    }

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors on;
    }
}

