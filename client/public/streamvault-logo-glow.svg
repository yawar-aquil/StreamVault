<svg width="250" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
          <feFuncA type="linear" slope="3"/>
      </feComponentTransfer>
      <feFlood flood-color="#E50914" flood-opacity="0.95" />
      <feComposite in2="glow1" operator="in" result="glow2" />
      <feMerge>
        <feMergeNode in="glow2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <image href="https://raw.githubusercontent.com/shakirali78690/StreamVault/main/client/public/streamvault-logo.png" x="40" y="40" width="170" height="170" filter="url(#glow)" />
</svg>