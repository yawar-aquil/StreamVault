<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault - System Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #e50914;
            /* Netflix Red */
            --secondary: #b20710;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.15) 0%, rgba(3, 7, 18, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(178, 7, 16, 0.1) 0%, rgba(3, 7, 18, 0) 70%);
            border-radius: 50%;
            top: 20%;
            left: 80%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(0.9);
            }

            100% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @keyframes float {
            0% {
                transform: translate(-50%, -50%) translateY(0px);
            }

            50% {
                transform: translate(-50%, -50%) translateY(-20px);
            }

            100% {
                transform: translate(-50%, -50%) translateY(0px);
            }
        }

        /* Glass Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4rem 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Animated border line at top */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            animation: shunt 3s linear infinite;
        }

        @keyframes shunt {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            /* background: linear-gradient(135deg, rgba(229, 9, 20, 0.1), rgba(0, 0, 0, 0.2)); */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            /* border: 1px solid rgba(255, 255, 255, 0.1); */
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(229, 9, 20, 0.5));
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #fee2e2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 15px -3px rgba(229, 9, 20, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(229, 9, 20, 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="glow-2"></div>

    <div class="card">
        <div class="icon-wrapper">
            <!-- Using Raw GitHub URL for the logo to avoid Nginx static file config issues -->
            <img src="https://raw.githubusercontent.com/shakirali78690/StreamVault/main/client/public/streamvault-logo.png"
                alt="StreamVault Logo" class="logo-img" onerror="this.style.display='none'">
        </div>

        <h1>System Update</h1>

        <p>
            StreamVault is currently enhancing your experience. We're installing upgrades to improve performance and
            stability.<br><br>
            We'll be back online in just a few moments.
        </p>

        <button onclick="window.location.reload()" class="btn">
            Refresh Status
        </button>

        <div class="footer">
            Error Code: 503 • Service Unavailable
        </div>
    </div>
</body>

</html>
